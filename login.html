<html lang="en"><head></head><body>﻿

    <meta charset="utf-8">
    <title>Login - Tribun Janten</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">

    <!-- Topbar Start -->
    <div class="container-fluid d-none d-lg-block px-0">
        <div class="row align-items-center bg-dark px-lg-5">
            <div class="col-lg-12">
                <nav class="navbar navbar-expand-sm bg-dark p-0">
                    <ul class="navbar-nav ml-auto mr-n2">
                        <li class="nav-item border-right border-secondary">
                            <a class="nav-link text-body small" href="#" id="currentDate"></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-body small" href="index.html">Back to Home</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        <div class="row align-items-center bg-white py-3 px-lg-5">
            <div class="col-lg-12 text-center">
                <a href="index.html" class="navbar-brand p-0">
                    <h1 class="m-0 display-4 text-uppercase text-primary">Tribun<span class="text-secondary font-weight-normal">Janten</span></h1>
                </a>
            </div>
        </div>
    </div>

    <!-- Login Form -->
    <div class="container-fluid py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="bg-white border p-5">
                        <h2 class="text-center mb-4 text-uppercase font-weight-bold">Login</h2>
                        
                        <!-- Alert Messages -->
                        <div id="alertMessage" class="alert alert-dismissible fade show" role="alert" style="display: none;">
                            <span id="alertText"></span>
                            <button type="button" class="close" onclick="hideAlert()">
                                <span>×</span>
                            </button>
                        </div>

                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email" required="">
                            </div>
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Enter your password" required="">
                            </div>
                            <div class="form-group form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Login</button>
                            <div class="text-center mt-3">
                                <a href="#" class="text-secondary">Forgot Password?</a>
                            </div>
                            <hr>
                            <div class="text-center">
                                <p>Don't have an account? </p>
                            </div>
                            <div class="text-center">
                                <p><a href="test-auth.html" class="text-secondary small"> "  Debug Authentication</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="container-fluid bg-dark pt-4 px-sm-3 px-md-5">
        <div class="row py-4">
            <div class="col-12 text-center">
                <p class="text-white">© 2026 <a href="index.html" class="text-primary">Tribun Janten</a>. All Rights Reserved.</p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    
    <script>
        console.log(' "  Login page loaded');
        
        // Function to show alert
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            const alertText = document.getElementById('alertText');
            
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertText.textContent = message;
            alertDiv.style.display = 'block';
            
            console.log(`[ALERT ${type.toUpperCase()}] ${message}`);
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                hideAlert();
            }, 5000);
        }
        
        // Function to hide alert
        function hideAlert() {
            document.getElementById('alertMessage').style.display = 'none';
        }
        
        // Handle login
        function handleLogin(event) {
            event.preventDefault();
            console.log(' "  Login attempt started...');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            console.log(' "  Email:', email);
            console.log(' "  Password: [HIDDEN]');
            console.log('💾 Remember:', remember);
            
            // Get users from localStorage
            const usersString = localStorage.getItem('users');
            console.log('👥 Users in storage:', usersString ? 'Found' : 'Not found');
            
            const users = JSON.parse(usersString || '[]');
            console.log('👥 Total users:', users.length);
            
            // Find user
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                console.log('✅ User found:', user.fullname);
                
                // Login successful
                const session = {
                    email: user.email,
                    name: user.fullname,
                    loginTime: new Date().toISOString(),
                    remember: remember
                };
                
                console.log('💾 Saving session:', session);
                
                // Save session
                localStorage.setItem('userSession', JSON.stringify(session));
                
                // Verify session was saved
                const savedSession = localStorage.getItem('userSession');
                console.log('✅ Session saved:', savedSession ? 'Success' : 'Failed');
                
                showAlert('Login berhasil! Mengalihkan ke halaman utama...', 'success');
                
                // Redirect to index after 1.5 seconds
                setTimeout(() => {
                    console.log(' "  Redirecting to index.html...');
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                console.log('❌ Login failed - user not found');
                showAlert('Email atau password salah. Silakan coba lagi.', 'danger');
            }
        }
        
        // Check if already logged in - IMPROVED VERSION
        window.onload = function() {
            console.log(' "  Checking if already logged in...');
            const sessionString = localStorage.getItem('userSession');
            
            if (!sessionString) {
                console.log('✅ No active session - ready for login');
                return;
            }
            
            try {
                const session = JSON.parse(sessionString);
                console.log(' "  Session data:', session);
                
                // Validate session has required fields
                if (session && session.name && session.email) {
                    console.log('✅ Valid session found - user:', session.name);
                    showAlert('Anda sudah login sebagai ' + session.name + '. Mengalihkan...', 'info');
                    setTimeout(() => {
                        console.log(' "  Redirecting to index.html...');
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    console.log('⚠️ Invalid session (missing fields) - clearing...');
                    localStorage.removeItem('userSession');
                    showAlert('Session tidak valid. Silakan login kembali.', 'warning');
                }
            } catch (error) {
                console.error('❌ Error parsing session:', error);
                console.log(' - ️ Clearing corrupted session...');
                localStorage.removeItem('userSession');
                showAlert('Session corrupted. Silakan login kembali.', 'warning');
            }
        }
        
        // Debug info
        console.log('💾 LocalStorage status:');
        console.log('- users:', localStorage.getItem('users') ? 'EXISTS' : 'NOT FOUND');
        console.log('- userSession:', localStorage.getItem('userSession') ? 'EXISTS' : 'NOT FOUND');
    </script>

    <script>
    const dateElement = document.getElementById("currentDate");

    const today = new Date();

    const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    };

    const formattedDate = today.toLocaleDateString('en-US', options);

    dateElement.textContent = formattedDate;
    </script>

</body></html>
