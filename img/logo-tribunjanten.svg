<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <!-- Background -->
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B1F3A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Text -->
  <text x="20" y="65" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900" fill="url(#textGradient)" letter-spacing="2">
    TRIBUN
  </text>
  
  <!-- Subtitle -->
  <text x="20" y="88" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="300" fill="#31404B" letter-spacing="3">
    JANTEN
  </text>
  
  <!-- Accent line -->
  <line x1="20" y1="75" x2="80" y2="75" stroke="#31404B" stroke-width="3" stroke-linecap="round"/>
</svg>